services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server --console-address ":9001" /data
    hostname: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data:/data