services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: sqlite:///./notes.db
    volumes:
      - ./notes.db:/app/notes.db
    depends_on:
      - redis

volumes:
  redis_data: