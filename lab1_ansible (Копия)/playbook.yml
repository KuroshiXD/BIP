- name: Лаба 1
  hosts: webservers
  become: true

  tasks:

    - name: Обновление кеша
      apt:
        update_cache: yes

    - name: Установка необходимых пакетов для добавления репо
      apt:
        name:
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Добавление GPG ключа Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Добавление репозитория Docker
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      register: docker_repo_status

    - name: Обновление кеша apt
      apt:
        update_cache: yes
      when: docker_repo_status.changed

    - name: Установка Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Запуск и включение Docker сервиса
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Установка плагина Docker Compose
      apt:
        name: docker-compose-plugin
        state: present

    - name: Установка Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Запуск и включение Nginx сервиса
      systemd:
        name: nginx
        state: started
        enabled: yes
